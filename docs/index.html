<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>IRSAN AI Nexus</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #05070f;
      --panel: rgba(16, 22, 45, 0.78);
      --txt: #dbe8ff;
      --muted: #8ea2d8;
      --accent: #6de4ff;
      --accent-2: #887bff;
      --danger: #ff8ba7;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at 10% 10%, #16213f 0%, var(--bg) 45%), radial-gradient(circle at 90% 20%, #2b1263 0%, transparent 35%);
      font-family: Inter, Segoe UI, system-ui, sans-serif;
      color: var(--txt);
      display: grid;
      place-items: center;
      padding: 2rem;
    }
    .card {
      width: min(980px, 100%);
      background: var(--panel);
      border: 1px solid rgba(109, 228, 255, 0.2);
      border-radius: 20px;
      padding: 1.4rem;
      backdrop-filter: blur(8px);
      box-shadow: 0 12px 45px rgba(16, 15, 30, 0.55);
    }
    h1 { margin-top: 0; font-size: 1.8rem; }
    .subtitle { color: var(--muted); margin-bottom: 1rem; }
    form { display: grid; grid-template-columns: 1fr auto; gap: 0.7rem; }
    input, button, textarea {
      border-radius: 10px;
      border: 1px solid rgba(173, 203, 255, 0.25);
      background: rgba(7, 12, 28, 0.8);
      color: var(--txt);
      padding: 0.7rem 0.9rem;
      font: inherit;
    }
    button {
      cursor: pointer;
      border-color: rgba(109, 228, 255, 0.35);
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #020713;
      font-weight: 700;
    }
    button:disabled { opacity: 0.7; cursor: progress; }
    .status { margin: 0.8rem 0; color: var(--muted); }
    .status.error { color: var(--danger); }
    textarea {
      width: 100%;
      min-height: 440px;
      margin-top: 0.7rem;
      resize: vertical;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>IRSAN AI Nexus — Repo Intelligence</h1>
    <p class="subtitle">Analyze GitHub repositories with one click. This UI works locally and on GitHub Pages (via configurable API base URL). Reports are persisted and can be fetched via /reports.</p>
    <form id="analyze-form">
      <input id="repo-url" value="https://github.com/psf/requests" placeholder="https://github.com/org/repo" required />
      <button id="analyze-btn" type="submit">Analyze</button>
    </form>
    <div class="status" id="status">Ready.</div>
    <textarea id="output" readonly>{ "hint": "Analysis result will appear here." }</textarea>
  </main>
  <script>
    const form = document.getElementById('analyze-form');
    const repoUrl = document.getElementById('repo-url');
    const output = document.getElementById('output');
    const status = document.getElementById('status');
    const button = document.getElementById('analyze-btn');

    const params = new URLSearchParams(window.location.search);
    const apiBase = params.get('api') || window.localStorage.getItem('IRSAN_API_BASE') || '';
    if (apiBase) window.localStorage.setItem('IRSAN_API_BASE', apiBase);

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      button.disabled = true;
      status.className = 'status';
      status.textContent = 'Analyzing repository...';
      output.value = '';

      try {
        const endpoint = `${apiBase}/analyze`;
        const res = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ repo_url: repoUrl.value.trim(), save_report: true })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || `Request failed (${res.status})`);
        output.value = JSON.stringify(data, null, 2);
        const reportInfo = data.report_id ? ` Report ID: ${data.report_id}` : '';
        status.textContent = `Done.${reportInfo}`;
      } catch (error) {
        status.className = 'status error';
        status.textContent = `Error: ${error.message}`;
        output.value = JSON.stringify({ error: error.message }, null, 2);
      } finally {
        button.disabled = false;
      }
    });
  </script>
</body>
</html>
